name = "constellation-telemetry"
main = "src/index.js"
compatibility_date = "2026-05-19"
workers_dev = true

# Create and bind the database before deploying:
#   npx wrangler d1 create constellation
# Then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "constellation"
database_id = "bae242c9-9409-4d1d-81b9-736d021c4e97"

# Set secrets with:
#   npx wrangler secret put CONSTELLATION_SECRETS --config worker/wrangler.toml
# Value shape:
#   {"linux":"...","mac":"...","win":"..."}

# Phase C / D — Langfuse usage refresh (aggregate + per-agent).
# Phase B will share this cron once it lands.
[triggers]
crons = ["*/15 * * * *"]

# Langfuse secrets — set via:
#   npx wrangler secret put LANGFUSE_PUBLIC_KEY --config worker/wrangler.toml
#   npx wrangler secret put LANGFUSE_SECRET_KEY --config worker/wrangler.toml
#   npx wrangler secret put LANGFUSE_HOST       --config worker/wrangler.toml
# LANGFUSE_HOST example: https://us.cloud.langfuse.com
# LANGFUSE_PROJECT_ID is optional and documented only.

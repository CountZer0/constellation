name: Deploy to GitHub Pages

# Only deploy when frontend files change, or when triggered manually.
# Hourly snapshot commits (which only touch *_agents.json / agents.json)
# do NOT trigger a deploy — that's the noise this filter prevents.
on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - '.nojekyll'
      - 'preview.png'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
